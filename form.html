    <h1>User Registration Form</h1>
<form action="/action_page.php">
    <fieldset style="background-color: lightblue;">
      <legend>Personal Information</legend>
      <label for="fname">First name:</label>
      <input type="text" name="fname" placeholder="First name" value="" autofocus><br><br>
      <label for="lname">Last name:</label>
      <input type="text" name="lname" placeholder="Last name" value=""><br><br>
      <label for="email">Email:</label>
      <input type="email" name="email" placeholder="enter your email here" value=""><br><br>
      <label for="password">Password:</label>
      <input type="password" name="password" placeholder="enter your password here" value=""><br><br>
      <label for="phone">Phone:</label>
      <input type="tel" name="phone" placeholder="enter your phone number here" value=""><br><br>
      <label for="bday">Date of Birth:</label>
      <input type="date" name="bday" placeholder="enter your date of birth here" value=""><br><br>
      <label for="gender">Gender:</label>
      <input type="radio" id="male" name="gender" value="male">
      <label for="male">Male</label>
  <input type="radio" id="female" name="gender" value="female">
  <label for="female">Female</label>
  <input type="radio" id="other" name="gender" value="other">
  <label for="other">Other</label>
  <br><br>
  <label>Country:</label>
  <select name="country" id="country">
    <option value="uk">Bangladesh</option>
    <option value="usa">USA</option>
    <option value="canada">Canada</option>
    <option value="uk">UK</option>
    <option value="uk">India</option>
  </select>
  <br><br>
  <label for="District">District:</label>
  <input list="districts" name="District" id="District" placeholder="enter your district here">
  <datalist id="districts">
    <option value="Dhaka">
    <option value="Chittagong">
    <option value="Khulna">
    <option value="Barisal">
    <option value="Sylhet">
    </datalist>
  <br><br>
  <label>upload profile picture:</label>
  <input type="file" name="profile_pic" accept="image/*" required><br><br>
  <label for="Skills">Skills:</label>
  <input type="checkbox" id="html" name="skills" value="HTML">
  <label for="html">HTML</label>
  <input type="checkbox" id="css" name="skills" value="CSS">
  <label for="css">CSS</label>
  <input type="checkbox" id="js" name="skills" value="JavaScript">
  <label for="js">JavaScript</label>
  <input type="checkbox" id="python" name="skills" value="Python">
  <label for="python">Python</label>
  <input type="checkbox" id="java" name="skills" value="Java">
  <label for="java">Java</label>
  <br><br>
  <label for="links">Links:</label>
  <input type="url" name="links" id="links" placeholder="https://example.com" value=""><br><br>
  <label for="comments">Comments:</label>
  <textarea name="comments" id="comments" rows="4" cols="50"></textarea><br><br>
  <label for="PIN">PIN:</label>
  <input type="number" name="PIN" id="PIN" placeholder="enter your PIN" value="" size="10" maxlength="5"><br><br>
  <input type="submit" value="Submit">
  <input type="reset" value="Reset">
  </fieldset>
</form>


</body>
</html>
